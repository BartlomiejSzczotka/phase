# Comprehensive Rules Section 202: Mana Cost and Color

[_meta]
section = 202
title = "Mana Cost and Color"

[cr_202_1]
rule = "202.1"
text = "A card’s mana cost is indicated by mana symbols near the top of the card. (See rule 107.4.) On most cards, these symbols are printed in the upper right corner. Some cards from the Future Sight set have alternate frames in which the mana symbols appear to the left of the illustration."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_1a]
rule = "202.1a"
text = "The mana cost of an object represents what a player must spend from their mana pool to cast that card. Unless an object’s mana cost includes Phyrexian mana symbols (see rule 107.4f), paying that mana cost requires matching the type of any colored or colorless mana symbols as well as paying the generic mana indicated in the cost."
status = "implemented"
impl_files = ["game/mana_payment.rs:129", "game/mana_payment.rs:131"]
test_files = []
notes = ""

[cr_202_1b]
rule = "202.1b"
text = "Some objects have no mana cost. This normally includes all land cards, any other cards that have no mana symbols where their mana cost would appear, tokens (unless the effect that creates them specifies otherwise), and nontraditional Magic cards. Having no mana cost represents an unpayable cost (see rule 118.6). Note that lands are played without paying any costs (see rule 305, “Lands”)."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_2]
rule = "202.2"
text = "An object is the color or colors of the mana symbols in its mana cost, regardless of the color of its frame."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_2a]
rule = "202.2a"
text = "The five colors are white, blue, black, red, and green. The white mana symbol is represented by {W}, blue by {U}, black by {B}, red by {R}, and green by {G}."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_2b]
rule = "202.2b"
text = "Objects with no colored mana symbols in their mana costs are colorless."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_2c]
rule = "202.2c"
text = "An object with two or more different colored mana symbols in its mana cost is each of the colors of those mana symbols. Most multicolored cards are printed with a gold frame, but this is not a requirement for a card to be multicolored."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_2d]
rule = "202.2d"
text = "An object with one or more hybrid mana symbols and/or Phyrexian mana symbols in its mana cost is all of the colors of those mana symbols, in addition to any other colors the object might be. (Most cards with hybrid mana symbols in their mana costs are printed in a two-tone frame. See rule 107.4e.)"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_2e]
rule = "202.2e"
text = "An object may have a color indicator printed to the left of the type line. That object is each color denoted by that color indicator. (See rule 204.)"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_2f]
rule = "202.2f"
text = "Effects may change an object’s color, give a color to a colorless object, or make a colored object become colorless; see rule 105.3."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_3]
rule = "202.3"
text = "The mana value of an object is a number equal to the total amount of mana in its mana cost, regardless of color."
status = "implemented"
impl_files = ["game/filter.rs:246", "parser/oracle_target.rs:953", "parser/oracle_target.rs:1047", "types/ability.rs:769", "types/ability.rs:774", "types/ability.rs:869", "types/mana.rs:399"]
test_files = []
notes = ""

[cr_202_3a]
rule = "202.3a"
text = "The mana value of an object with no mana cost is 0, unless that object is the back face of a nonmodal double-faced permanent or spell, or it is a melded permanent."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_3b]
rule = "202.3b"
text = "The mana value of the back face of a nonmodal double-faced permanent or spell’s back face is calculated as though it had the mana cost of its front face. If a permanent or spell is a copy of the back face of a nonmodal double-faced object (even if the card representing that copy is itself a double-faced card), the mana value of the copy is 0."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_3c]
rule = "202.3c"
text = "The mana value of a melded permanent is calculated as though it had the combined mana cost of the front faces of each card that represents it. If a permanent is a copy of a melded permanent (even if that copy is represented by two other meld cards), the mana value of the copy is 0."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_3d]
rule = "202.3d"
text = "The mana value of a split card not on the stack or of a fused split spell on the stack is determined from the combined mana costs of its halves. Otherwise, while a split card is on the stack, the mana value of the spell is determined by the mana cost of the half that was chosen to be cast. See rule 709, “Split Cards.”"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_3e]
rule = "202.3e"
text = "When calculating the mana value of an object with an {X} in its mana cost, X is treated as 0 while the object is not on the stack, and X is treated as the number chosen for it while the object is on the stack."
status = "implemented"
impl_files = ["game/engine.rs:1075", "game/quantity.rs:180", "types/mana.rs:400"]
test_files = []
notes = ""

[cr_202_3f]
rule = "202.3f"
text = "When calculating the mana value of an object with a hybrid mana symbol in its mana cost, use the largest component of each hybrid symbol."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_3g]
rule = "202.3g"
text = "Each Phyrexian mana symbol in a card’s mana cost contributes 1 to its mana value."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_202_4]
rule = "202.4"
text = "Any additional cost listed in an object’s rules text or imposed by an effect isn’t part of the mana cost. (See rule 601, “Casting Spells.”) Such costs are paid at the same time as the spell’s other costs."
status = "missing"
impl_files = []
test_files = []
notes = ""
