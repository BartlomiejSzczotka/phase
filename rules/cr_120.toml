[cr_120_4]
rule = "120.4"
text = "Damage is processed in a four-part sequence."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_120_4a]
rule = "120.4a"
text = "First, if an effect that’s causing damage to be dealt states that excess damage that would be dealt to a permanent is dealt to another permanent or player instead, the damage event is modified accordingly. If the first permanent is a creature, the excess damage is the amount of damage in excess of what would be lethal damage, taking into account damage already marked on the creature and damage from other sources that would be dealt at the same time. (See rule 120.6.) Any amount of damage greater than 1 is excess damage if the source dealing that damage to a creature has deathtouch. (See rule 702.2.) If the first permanent is a planeswalker, the excess damage is the amount of damage in excess of that planeswalker’s loyalty, taking into account damage from other sources that would be dealt at the same time. If the first permanent is a battle, the excess damage is the amount of damage in excess of that battle’s defense, taking into account damage from other sources that would be dealt at the same time. If the first permanent has multiple card types from among the list of creature, planeswalker, and battle, the excess damage is the greatest of the calculated amounts for each of the card types it has."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_120_4b]
rule = "120.4b"
text = "Second, damage is dealt, as modified by replacement and prevention effects that interact with damage. (See rule 614, “Replacement Effects,” and rule 615, “Prevention Effects.”) Abilities that trigger when damage is dealt trigger now and wait to be put on the stack."
status = "implemented"
impl_files = ["game/effects/deal_damage.rs:69", "game/effects/deal_damage.rs:72"]
test_files = []
notes = ""

[cr_120_4c]
rule = "120.4c"
text = "Third, damage that’s been dealt is processed into its results, as modified by replacement effects that interact with those results (such as life loss or counters)."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_120_4d]
rule = "120.4d"
text = "Finally, the damage event occurs."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_120_5]
rule = "120.5"
text = "Damage dealt to a creature, planeswalker, or battle doesn’t destroy it. Likewise, the source of that damage doesn’t destroy it. Rather, state-based actions may destroy a creature or otherwise put a permanent into its owner’s graveyard, due to the results of the damage dealt to that permanent. See rule 704."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_120_6]
rule = "120.6"
text = "Damage marked on a creature remains until the cleanup step, even if that permanent stops being a creature. If the total damage marked on a creature is greater than or equal to its toughness, that creature has been dealt lethal damage and is destroyed as a state-based action (see rule 704). All damage marked on a permanent is removed when it regenerates (see rule 701.19, “Regenerate”) and during the cleanup step (see rule 514.2)."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_120_7]
rule = "120.7"
text = "The source of damage is the object that dealt it. If an effect requires a player to choose a source of damage, they may choose a permanent; a spell on the stack (including a permanent spell); any object referred to by an object on the stack, by a prevention or replacement effect that’s waiting to apply, or by a delayed triggered ability that’s waiting to trigger (even if that object is no longer in the zone it used to be in); or a face-up object in the command zone. A source doesn’t need to be capable of dealing damage to be a legal choice. See rule 609.7, “Sources of Damage.”"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_120_8]
rule = "120.8"
text = "If a source would deal 0 damage, it does not deal damage at all. That means abilities that trigger on damage being dealt won’t trigger. It also means that replacement effects that would increase the damage dealt by that source, or would have that source deal that damage to a different object or player, have no event to replace, so they have no effect."
status = "implemented"
impl_files = ["game/effects/deal_damage.rs:89", "parser/oracle_effect/mod.rs:3722"]
test_files = []
notes = ""

[cr_120_9]
rule = "120.9"
text = "If an ability triggers on damage being dealt by a specific source or sources, and the effect refers to the “damage dealt,” it refers only to the damage dealt by the specified sources and not to any damage dealt at the same time by other sources."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_120_10]
rule = "120.10"
text = "Some triggered abilities check whether a permanent has been dealt excess damage. These abilities check after the permanent has been dealt damage by one or more sources. If those sources together dealt an amount of damage to a creature greater than lethal damage, excess damage equal to the difference was dealt to that creature. If those sources together dealt an amount of damage to a planeswalker greater than that planeswalker’s loyalty before the damage was dealt, excess damage equal to the difference was dealt to that planeswalker. If those sources together dealt an amount of damage to a battle greater than that battle’s defense before the damage was dealt, excess damage equal to the difference was dealt to that battle. If a permanent has multiple card types from among the list of creature, planeswalker, and battle, the excess damage dealt to that permanent is the greatest of the calculated amounts for each of the card types it has."
status = "missing"
impl_files = []
test_files = []
notes = ""
