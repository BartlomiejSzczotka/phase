# Comprehensive Rules Section 120: Damage

[_meta]
section = 120
title = "Damage"

[cr_120_1]
rule = "120.1"
text = "Objects can deal damage to battles, creatures, planeswalkers, and players. This is generally detrimental to the object or player that receives that damage. An object that deals damage is the source of that damage."
status = "implemented"
impl_files = ["game/effects/counters.rs:84", "game/effects/deal_damage.rs:225", "game/triggers.rs:955", "parser/oracle_effect/imperative.rs:864", "parser/oracle_trigger.rs:728", "parser/oracle_trigger.rs:737", "parser/oracle_trigger.rs:1045", "parser/oracle_trigger.rs:1879", "parser/oracle_trigger.rs:1891", "parser/oracle_trigger.rs:3959", "parser/oracle_trigger.rs:4548", "parser/oracle_trigger.rs:4564", "types/ability.rs:3118"]
test_files = []
notes = ""

