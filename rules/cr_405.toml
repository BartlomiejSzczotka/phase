# Comprehensive Rules Section 405: Stack

[_meta]
section = 405
title = "Stack"

[cr_405_1]
rule = "405.1"
text = "When a spell is cast, the physical card is put on the stack (see rule 601.2a). When an ability is activated or triggers, it goes on top of the stack without any card associated with it (see rules 602.2a and 603.3)."
status = "implemented"
impl_files = ["game/stack.rs:11"]
test_files = []
notes = ""

[cr_405_2]
rule = "405.2"
text = "The stack keeps track of the order that spells and/or abilities were added to it. Each time an object is put on the stack, it’s put on top of all objects already there."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_3]
rule = "405.3"
text = "If an effect puts two or more objects on the stack at the same time, those controlled by the active player are put on lowest, followed by each other player’s objects in APNAP order (see rule 101.4). If a player controls more than one of these objects, that player chooses their relative order on the stack."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_4]
rule = "405.4"
text = "Each spell has all the characteristics of the card associated with it. Each activated or triggered ability that’s on the stack has the text of the ability that created it and no other characteristics. The controller of a spell is the player who cast it. The controller of an activated ability is the player who activated it. The controller of a triggered ability is the player who controlled the ability’s source when it triggered, unless it’s a delayed triggered ability. To determine the controller of a delayed triggered ability, see rules 603.7d–f."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_5]
rule = "405.5"
text = "When all players pass in succession, the top (last-added) spell or ability on the stack resolves. If the stack is empty when all players pass, the current step or phase ends and the next begins."
status = "implemented"
impl_files = ["game/stack.rs:21"]
test_files = []
notes = ""

[cr_405_6]
rule = "405.6"
text = "Some things that happen during the game don’t use the stack."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_6a]
rule = "405.6a"
text = "Effects don’t go on the stack; they’re the result of spells and abilities resolving. Effects may create delayed triggered abilities, however, and these may go on the stack when they trigger (see rule 603.7)."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_6b]
rule = "405.6b"
text = "Static abilities continuously generate effects and don’t go on the stack. (See rule 604, “Handling Static Abilities.”) This includes characteristic-defining abilities such as “[This object] is red” (see rule 604.3)."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_6c]
rule = "405.6c"
text = "Mana abilities resolve immediately. If a mana ability both produces mana and has another effect, the mana is produced and the other effect happens immediately. If a player had priority before a mana ability was activated, that player gets priority after it resolves. (See rule 605, “Mana Abilities.”)"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_6d]
rule = "405.6d"
text = "Special actions don’t use the stack; they happen immediately. See rule 116, “Special Actions.”"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_6e]
rule = "405.6e"
text = "Turn-based actions don’t use the stack; they happen automatically when certain steps or phases begin. They’re dealt with before a player would receive priority (see rule 117.3a). Turn-based actions also happen automatically when each step and phase ends; no player receives priority afterward. See rule 703."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_6f]
rule = "405.6f"
text = "State-based actions don’t use the stack; they happen automatically when certain conditions are met. See rule 704. They are dealt with before a player would receive priority. See rule 117.5."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_6g]
rule = "405.6g"
text = "A player may concede the game at any time. That player leaves the game immediately. See rule 104.3a."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_405_6h]
rule = "405.6h"
text = "If a player leaves a multiplayer game, objects may leave the game, cease to exist, change control, or be exiled as a result. These actions happen immediately. See rule 800.4a."
status = "missing"
impl_files = []
test_files = []
notes = ""
