# Comprehensive Rules Section 502: Untap Step

[_meta]
section = 502
title = "Untap Step"

[cr_502_1]
rule = "502.1"
text = "First, all phased-in permanents with phasing that the active player controls phase out, and all phased-out permanents that the active player controlled when they phased out phase in. This all happens simultaneously. This turn-based action doesn’t use the stack. See rule 702.26, “Phasing.”"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_502_2]
rule = "502.2"
text = "Second, if it’s day and the previous turn’s active player didn’t cast any spells during that turn, it becomes night. If it’s night and the previous turn’s active player cast two or more spells during that turn, it becomes day. If it’s neither day nor night, this check doesn’t happen and it remains neither. This turn-based action doesn’t use the stack. See rule 730, “Day and Night.”"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_502_2a]
rule = "502.2a"
text = "Multiplayer games using the shared team turns option use a modified rule. If it’s day and no player on the previous turn’s active team cast a spell during that turn, it becomes night. If it’s night and any player on the previous turn’s active team cast two or more spells during the previous turn, it becomes day. If it’s neither day nor night, this check doesn’t happen and it remains neither. This turn-based action doesn’t use the stack."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_502_3]
rule = "502.3"
text = "Third, the active player determines which permanents they control will untap. Then they untap them all simultaneously. This turn-based action doesn’t use the stack. Normally, all of a player’s permanents untap, but effects can keep one or more of a player’s permanents from untapping."
status = "implemented"
impl_files = ["game/static_abilities.rs:123", "game/turns.rs:147", "types/statics.rs:186"]
test_files = []
notes = ""

[cr_502_4]
rule = "502.4"
text = "No player receives priority during the untap step, so no spells can be cast or resolve and no abilities can be activated or resolve. Any ability that triggers during this step will be held until the next time a player would receive priority, which is usually during the upkeep step. (See rule 503, “Upkeep Step.”)"
status = "implemented"
impl_files = ["game/turns.rs:414", "types/phase.rs:12"]
test_files = []
notes = ""
