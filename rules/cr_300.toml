# Comprehensive Rules Section 300: General (Card Types)

[_meta]
section = 300
title = "General (Card Types)"

[cr_300_1]
rule = "300.1"
text = "The card types are artifact, battle, conspiracy, creature, dungeon, enchantment, instant, kindred, land, phenomenon, plane, planeswalker, scheme, sorcery, and vanguard."
status = "missing"
