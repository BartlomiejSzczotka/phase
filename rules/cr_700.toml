[cr_700_5]
rule = "700.5"
text = "A player’s devotion to [color] is equal to the number of mana symbols of that color among the mana costs of permanents that player controls. A player’s devotion to [color 1] and [color 2] is equal to the number of mana symbols among the mana costs of permanents that player controls that are [color 1], [color 2], or both colors."
status = "implemented"
impl_files = ["game/derived.rs:12", "game/devotion.rs:8", "parser/oracle_target.rs:591", "parser/oracle_target.rs:1176", "parser/oracle_target.rs:2689", "types/ability.rs:837", "types/ability.rs:1072", "types/mana.rs:229"]
test_files = []
notes = ""

[cr_700_5a]
rule = "700.5a"
text = "A player’s devotion to each color and combination of colors, taking into account any effects that modify devotion, is calculated after considering any copy, control, or text-changing effects but before any other effects that modify the characteristics of permanents. This is an exception to 613.10. See also rule 613, “Interaction of Continuous Effects.”"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_6]
rule = "700.6"
text = "The term historic refers to an object that has the legendary supertype, the artifact card type, or the Saga subtype."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_7]
rule = "700.7"
text = "If an ability uses a phrase such as “this [something]” to identify an object, where [something] is a characteristic or other quality, it is referring to that particular object, even if it isn’t the appropriate quality at the time."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_8]
rule = "700.8"
text = "Some cards refer to a player’s party. A player’s party consists of up to one Cleric creature that player controls, up to one Rogue creature they control, up to one Warrior creature they control, and up to one Wizard creature they control."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_8a]
rule = "700.8a"
text = "If a spell, ability, or effect needs to determine the number of creatures in a player’s party, the calculation of that number is performed automatically by the game and results in a number between zero and four. Players don’t declare which specific creatures they control are in their party for such an effect."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_8b]
rule = "700.8b"
text = "If a creature has multiple creature types for which it could be the party member, it is counted as the party member for only one of those types. If there are different ways to count such a creature that results in different numbers of creatures in a player’s party, it is counted in such a way to get the highest result."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_8c]
rule = "700.8c"
text = "A player has a full party if there are four creatures in that player’s party."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_8d]
rule = "700.8d"
text = "One card, Stick Together, instructs players to choose a party from among creatures they control. To do so, for each of the creature types listed in rule 700.8, each player chooses up to one creature they control of that type."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_9]
rule = "700.9"
text = "Some cards refer to modified permanents. A permanent is modified if it has one or more counters on it (see rule 122), if it is equipped (see rule 301.5), or if it is enchanted by an Aura that is controlled by that permanent’s controller (see rule 303.4)."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_10]
rule = "700.10"
text = "Some cards refer to a permanent “that was activated this turn.” This means that the permanent was the source of an ability that was activated this turn, regardless of whether that permanent still has that activated ability or the player who activated it is still in the game."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_11]
rule = "700.11"
text = "Some cards refer to whether a player has “descended this turn.” This means that a permanent card has been put into that player’s graveyard from anywhere this turn. “The number of times [a player] descended this turn” means “the number of permanent cards put into [that player’s] graveyard from anywhere this turn.” In both cases, no permanent cards put into the player’s graveyard that turn are required to still be in that graveyard."
status = "missing"
impl_files = []
test_files = []
notes = ""

