# Comprehensive Rules Section 700: General (Additional Rules)

[_meta]
section = 700
title = "General (Additional Rules)"

[cr_700_1]
rule = "700.1"
text = "Anything that happens in a game is an event. Multiple events may take place during the resolution of a spell or ability. The text of triggered abilities and replacement effects defines the event they’re looking for. One “happening” may be treated as a single event by one ability and as multiple events by another."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_2]
rule = "700.2"
text = "A spell or ability is modal if it has two or more options in a bulleted list preceded by instructions for a player to choose a number of those options, such as “Choose one —.” Each of those options is a mode. Modal cards printed prior to the Khans of Tarkir™ set didn’t use bulleted lists for the modes; these cards have received errata in the Oracle card reference so the modes do appear in a bulleted list."
status = "implemented"
impl_files = ["ai_support/candidates.rs:223", "game/ability_utils.rs:48", "game/ability_utils.rs:109", "game/ability_utils.rs:147", "game/ability_utils.rs:731", "game/effects/choose.rs:8", "game/effects/choose.rs:113", "game/effects/choose_card.rs:5", "game/effects/choose_from_zone.rs:8", "game/effects/choose_from_zone.rs:46", "game/effects/choose_from_zone.rs:57", "game/effects/choose_from_zone.rs:75", "game/engine.rs:1890", "game/engine.rs:3030", "game/engine.rs:6412", "parser/oracle_effect/imperative.rs:1282", "parser/oracle_effect/sequence.rs:669", "parser/oracle_modal.rs:211", "types/ability.rs:23", "types/ability.rs:29", "types/ability.rs:2088", "types/ability.rs:2665", "types/ability.rs:2668", "types/game_state.rs:344", "types/game_state.rs:471", "types/game_state.rs:1042", "types/game_state.rs:1047"]
test_files = []
notes = ""

[cr_700_2a]
rule = "700.2a"
text = "The controller of a modal spell or activated ability chooses the mode(s) as part of casting that spell or activating that ability. If one of the modes would be illegal (due to an inability to choose legal targets, for example), that mode can’t be chosen. (See rule 601.2b.)"
status = "implemented"
impl_files = ["game/ability_utils.rs:701", "game/engine.rs:3025"]
test_files = []
notes = ""

[cr_700_2b]
rule = "700.2b"
text = "The controller of a modal triggered ability chooses the mode(s) as part of putting that ability on the stack. If one of the modes would be illegal (due to an inability to choose legal targets, for example), that mode can’t be chosen. If no mode is chosen, the ability is removed from the stack. (See rule 603.3c.)"
status = "implemented"
impl_files = ["game/triggers.rs:49", "game/triggers.rs:520"]
test_files = []
notes = ""

[cr_700_2c]
rule = "700.2c"
text = "If a spell or ability targets one or more targets only if a particular mode is chosen for it, its controller will need to choose those targets only if they chose that mode. Otherwise, the spell or ability is treated as though it did not have those targets. (See rule 601.2c.)"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_2d]
rule = "700.2d"
text = "If a player is allowed to choose more than one mode for a modal spell or ability, that player normally can’t choose the same mode more than once. However, some modal spells include the instruction “You may choose the same mode more than once.” If a particular mode is chosen multiple times, the spell is treated as if that mode appeared that many times in sequence. If that mode requires a target, the same player or object may be chosen as the target for each of those modes, or different targets may be chosen."
status = "implemented"
impl_files = ["ai_support/candidates.rs:260", "game/ability_utils.rs:703", "game/ability_utils.rs:742"]
test_files = []
notes = ""

[cr_700_2e]
rule = "700.2e"
text = "Some spells and abilities specify that a player other than their controller chooses a mode for it. In that case, the other player does so when the spell or ability’s controller normally would do so. If there is more than one other player who could make such a choice, the spell or ability’s controller decides which of those players will make the choice."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_2f]
rule = "700.2f"
text = "Modal spells and abilities may have different targeting requirements for each mode. Changing a spell or ability’s target can’t change its mode."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_2g]
rule = "700.2g"
text = "A copy of a modal spell or ability copies the mode(s) chosen for it. The controller of the copy can’t choose a different mode. (See rule 707.10.)"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_2h]
rule = "700.2h"
text = "Some modal spells have one or more modes with a cost listed before the effect of that mode. This indicates that the mode has an additional cost that must be paid as the spell is cast if that mode is chosen. If more than one such mode is chosen, all additional costs must be paid to cast that spell. Paying these costs follows the rules for paying additional costs in rules 601.2b and 601.2f–h."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_2i]
rule = "700.2i"
text = "Some modal spells have one or more pawprint symbols ({P}) rather than bullet points, as well as an instruction to choose up to a specified number of {P} “worth of modes.” While casting such a spell, its controller can choose any number of modes such that the total number of pawprint symbols listed for the chosen modes is not greater than the specified number."
status = "missing"
impl_files = []
test_files = []
notes = ""

