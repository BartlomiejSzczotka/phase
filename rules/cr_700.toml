rule = "700.3c"
text = "Objects grouped into piles don’t leave the zone they’re currently in. If cards in a graveyard are split into piles, the order of the graveyard must be maintained."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_700_3d]
