# Comprehensive Rules Section 704: State-Based Actions

[_meta]
section = 704
title = "State-Based Actions"

[cr_704_1]
rule = "704.1"
text = "State-based actions are game actions that happen automatically whenever certain conditions (listed below) are met. State-based actions don’t use the stack."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_704_1a]
rule = "704.1a"
text = "Abilities that watch for a specified game state are triggered abilities, not state-based actions. (See rule 603, “Handling Triggered Abilities.”)"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_704_2]
rule = "704.2"
text = "State-based actions are checked throughout the game and are not controlled by any player."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_704_3]
rule = "704.3"
text = "Whenever a player would get priority (see rule 117, “Timing and Priority”), the game checks for any of the listed conditions for state-based actions, then performs all applicable state-based actions simultaneously as a single event. If any state-based actions are performed as a result of a check, the check is repeated; otherwise all triggered abilities that are waiting to be put on the stack are put on the stack, then the check is repeated. Once no more state-based actions have been performed as the result of a check and no triggered abilities are waiting to be put on the stack, the appropriate player gets priority. This process also occurs during the cleanup step (see rule 514), except that if no state-based actions are performed as the result of the step’s first check and no triggered abilities are waiting to be put on the stack, then no player gets priority and the step ends."
status = "implemented"
impl_files = ["game/combat_damage.rs:26", "game/combat_damage.rs:43", "game/combat_damage.rs:1188", "game/combat_damage.rs:1253", "game/engine.rs:2889", "game/sba.rs:17", "game/turns.rs:529"]
test_files = []
notes = ""

[cr_704_4]
rule = "704.4"
text = "Unlike triggered abilities, state-based actions pay no attention to what happens during the resolution of a spell or ability."
status = "missing"
impl_files = []
test_files = []
notes = ""

