# Comprehensive Rules Section 100: General

[_meta]
section = 100
title = "General"

[cr_100_1]
rule = "100.1"
text = "These Magic rules apply to any Magic game with two or more players, including two-player games and multiplayer games."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_1a]
rule = "100.1a"
text = "A two-player game is a game that begins with only two players."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_1b]
rule = "100.1b"
text = "A multiplayer game is a game that begins with more than two players. See section 8, “Multiplayer Rules.”"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_2]
rule = "100.2"
text = "To play, each player needs their own deck of traditional Magic cards, small items to represent any tokens and counters, and some way to clearly track life totals."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_2a]
rule = "100.2a"
text = "In constructed play (a way of playing in which each player creates their own deck ahead of time), each deck has a minimum deck size of 60 cards. A constructed deck may contain any number of basic land cards and no more than four of any card with a particular English name other than basic land cards. For the purposes of deck construction, cards with interchangeable names have the same English name (see rule 201.3)."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_2b]
rule = "100.2b"
text = "In limited play (a way of playing in which each player gets the same quantity of unopened Magic product such as booster packs and creates their own deck using only this product and basic land cards), each deck has a minimum deck size of 40 cards. A limited deck may contain as many duplicates of a card as are included with the product."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_2c]
rule = "100.2c"
text = "Commander decks are subject to additional deckbuilding restrictions and requirements. See rule 903, “Commander,” for details."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_2d]
rule = "100.2d"
text = "Some formats and casual play variants allow players to use a supplementary deck of nontraditional Magic cards (see rule 108.2a). These supplementary decks have their own deck construction rules. See rule 717, “Attraction Cards;” rule 901, “Planechase;” and rule 904, “Archenemy.”"
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_3]
rule = "100.3"
text = "Some cards require coins or traditional dice. Some casual variants require additional items, such as specially designated cards, nontraditional Magic cards, and specialized dice."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_4]
rule = "100.4"
text = "Each player may also have a sideboard, which is a group of additional cards the player may use to modify their deck between games of a match. Sideboard rules and restrictions for some formats are modified by the Magic: The Gathering Tournament Rules (found at WPN.Wizards.com/en/rules-documents)."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_4a]
rule = "100.4a"
text = "In constructed play, a sideboard may contain no more than fifteen cards. The four-card limit (see rule 100.2a) applies to the combined deck and sideboard."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_4b]
rule = "100.4b"
text = "In limited play involving individual players, all cards in a player’s card pool not included in their deck are in that player’s sideboard."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_4c]
rule = "100.4c"
text = "In limited play involving the Two-Headed Giant multiplayer variant, all cards in a team’s card pool but not in either player’s deck are in that team’s sideboard."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_4d]
rule = "100.4d"
text = "In limited play involving other multiplayer team variants, each card in a team’s card pool but not in any player’s deck is assigned to the sideboard of one of those players. Each player has their own sideboard; cards may not be transferred between players."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_5]
rule = "100.5"
text = "If a deck must contain at least a certain number of cards, that number is referred to as a minimum deck size. There is no maximum deck size for non-Commander decks."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_6]
rule = "100.6"
text = "Most Magic tournaments (organized play activities where players compete against other players to win prizes) have additional rules covered in the Magic: The Gathering Tournament Rules (found at WPN.Wizards.com/en/rules-documents). These rules may limit the use of some cards, including barring all cards from some older sets."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_6a]
rule = "100.6a"
text = "Tournaments usually consist of a series of matches. A two-player match usually involves playing until one player has won two games. A multiplayer match usually consists of only one game."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_6b]
rule = "100.6b"
text = "Players can use the Magic Store & Event Locator at Locator.Wizards.com to find tournaments in their area."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_100_7]
rule = "100.7"
text = "Certain cards are intended for casual play and may have features and text that aren’t covered by these rules. These include Mystery Booster playtest cards, promotional cards and cards in “Un-sets” that were printed with a silver border, and cards in the Unfinity™ expansion that have an acorn symbol at the bottom of the card."
status = "missing"
impl_files = []
test_files = []
notes = ""
